---


name: complete devops hand on

on:
  push:
    branches:
      - main

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set short SHA
        run: |
          echo "SHORT_SHA=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
            docker build -t 130219922021/complete-devops-project:${{ env.SHORT_SHA }} .

      - name: Docker login
        run: echo ${{ secrets.DOCKER_TOKEN }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Push Docker image to Docker Hub
        run: |
            docker push 130219922021/complete-devops-project:${{ env.SHORT_SHA }}

      - name: set git author
        run: |
          git config --local user.email "arnaudfranckt4@gmail.com"
          git config --local user.name "130219922021"

      - name: update helm chart with new image tag
        run: |
          sed -i "s/tag: .*/tag: ${{ env.SHORT_SHA }}/" ./complite-devops-project-time-printer/values.yaml
          cat ./complite-devops-project-time-printer/values.yaml
          git add .
          git commit -m "Update Helm chart with new image tag ${{ env.SHORT_SHA }}"
          git push origin main